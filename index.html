<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verbal AI Judge</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
        }

        h1 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-bottom: 16px;
        }

        button {
            padding: 14px 20px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 8px;
        }

        .report {
            margin-top: 40px;
            white-space: pre-wrap;
            line-height: 1.6;
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Verbal AI Judge</h1>

        <form method="POST">
            <input
                type="text"
                name="url"
                placeholder="https://example.com"
                value="{{ url }}"
                required
            />

            <button type="submit">
                Analyze Website
            </button>
        </form>

        {% if report %}
            <div class="report">
                {{ report }}
            </div>
        {% endif %}
    </div>

</body>
</html>
